<div class="vh-100 d-flex align-items-center justify-content-center bg-light p-4">

  <div class="card shadow-lg border-0 text-center p-4" style="max-width:420px; border-radius:25px;"
       [class.opacity-0]="!isVisible()"
       [class.opacity-100]="isVisible()">

    <!-- Success Icon -->
    <div class="mb-4 position-relative">

      <div class="rounded-circle bg-success text-white d-inline-flex align-items-center justify-content-center"
           style="width:90px;height:90px;font-size:40px;">

        ✓

      </div>

    </div>

    <!-- Title -->
    <h2 class="fw-bold text-dark">
      Payment Confirmed!
    </h2>

    <p class="text-muted mt-2">
      Thank you for your purchase. Your order is being processed.
    </p>

    <!-- Progress Bar -->
    <div class="progress mt-4 mb-3" style="height:8px;">
      <div 
        class="progress-bar bg-success progress-bar-striped progress-bar-animated"
        role="progressbar"
        [style.width.%]="progress()">
      </div>
    </div>

    <!-- Countdown -->
    <p class="text-muted small">
      Redirecting to home in
      <span class="fw-bold text-dark">{{ countdown() }}s</span>
    </p>

    <!-- Button -->
    <div class="mt-4">

      <button
        (click)="goToHome()"
        class="btn btn-dark w-100 py-2">
        Go to Home Now
      </button>

    </div>

    <!-- Support -->
    <p class="small text-muted mt-3">
      Problems?
      <a href="#" class="text-success text-decoration-none">
        Contact Support
      </a>
    </p>

  </div>

</div>
